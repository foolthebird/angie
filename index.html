<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Angie: My Best Friend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --secondary-pink: #f7cad0;
            --accent-gold: #ffd700;
            --soft-white: #fffcf9;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--soft-white);
            color: #444;
            overflow-x: hidden;
        }

        .hero-section {
            background: linear-gradient(135deg, #ff85a2 0%, #ffafbd 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero-content h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin-bottom: 20px;
            animation: fadeInDown 1.5s ease-out;
        }

        .hero-content p {
            font-size: 1.5rem;
            animation: fadeInUp 1.5s ease-out;
        }

        /* Heart Animation */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            animation: float 4s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .section-title {
            font-family: 'Dancing Script', cursive;
            color: var(--primary-pink);
            font-size: 3rem;
            text-align: center;
            margin-bottom: 40px;
        }

        /* --- Polaroid Gallery Styling - UPDATED FOR PERFECT FIT --- */
        .polaroid {
            background: white;
            /* Added explicit aspect ratio for the whole polaroid for consistency */
            aspect-ratio: 3 / 4; 
            padding: 15px 15px 15px 15px; /* Unified padding */
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            transform: rotate(-2deg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
        }

        .polaroid:nth-child(even) {
            transform: rotate(2deg);
        }

        .polaroid:hover {
            transform: scale(1.08) rotate(0deg);
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .polaroid-img {
            width: 100%;
            /* Changed height to aspect-ratio for a perfect square photo area */
            aspect-ratio: 1 / 1; 
            background-color: #f3f3f3;
            overflow: hidden;
            border: 1px solid #eee;
            position: relative;
        }

        .polaroid-img img {
            width: 100%;
            height: 100%;
            /* THIS IS THE MAGIC PROPERTY FOR PERFECT FITTING */
            object-fit: cover; 
            /* This centers the image focus, good for portraits */
            object-position: center center; 
            display: block;
            transition: transform 0.5s ease;
        }

        .polaroid:hover .polaroid-img img {
            transform: scale(1.1);
        }

        .card-caption {
            font-family: 'Dancing Script', cursive;
            text-align: center;
            font-size: 1.6rem;

            flex-grow: 1;
